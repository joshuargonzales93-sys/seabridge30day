<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>30 Day Challenge — Seabridge Gym</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0a0a0a;color:#e8e8e8;font-family:'DM Sans',sans-serif;min-height:100vh}
header{background:#111;border-bottom:2px solid #d4a843;padding:16px 20px 10px;text-align:center;position:sticky;top:0;z-index:100}
header h1{font-family:'Bebas Neue',sans-serif;font-size:clamp(1.8rem,7vw,3rem);letter-spacing:5px;color:#d4a843;line-height:1}
header p{font-size:.68rem;color:#555;letter-spacing:3px;text-transform:uppercase;margin-top:3px}
#sync{font-size:.6rem;letter-spacing:2px;text-transform:uppercase;margin-top:3px;color:#888}
#lb{display:flex;gap:8px;padding:12px 16px 0;max-width:860px;margin:0 auto}
.lbc{flex:1;background:#141414;border:2px solid #1e1e1e;border-radius:10px;padding:10px 12px;cursor:pointer;transition:all .2s}
.lbc.on{background:#1a1500;border-color:#d4a843}
.lbn{font-family:'Bebas Neue',sans-serif;font-size:1.1rem;letter-spacing:2px;color:#555}
.lbc.on .lbn{color:#d4a843}
.lbp{font-size:1.5rem;font-weight:700;color:#e8e8e8;line-height:1.1}
.lbc.on .lbp{color:#d4a843}
.lbb{height:4px;background:#222;border-radius:2px;margin-top:6px;overflow:hidden}
.lbf{height:100%;background:#3ddc84;border-radius:2px;transition:width .4s}
.lbc.on .lbf{background:linear-gradient(90deg,#d4a843,#f0c060)}
.lbx{font-size:.6rem;color:#444;margin-top:4px;letter-spacing:1px}
#main{max-width:860px;margin:0 auto;padding:0 16px 60px}
#strip{display:flex;gap:6px;overflow-x:auto;padding:14px 0 10px;scrollbar-width:none}
#strip::-webkit-scrollbar{display:none}
.db{flex-shrink:0;width:38px;height:38px;border-radius:50%;border:2px solid #2a2a2a;background:#161616;color:#555;font-family:'Bebas Neue',sans-serif;font-size:.9rem;cursor:pointer;transition:all .15s;position:relative;outline:none}
.db.on{border-color:#d4a843;background:#d4a843;color:#000}
.db.dn{border-color:#3ddc84;background:#162018;color:#3ddc84}
.db.dn::after{content:'';position:absolute;bottom:-2px;right:-2px;width:9px;height:9px;background:#3ddc84;border-radius:50%;border:2px solid #0a0a0a}
.dh{display:flex;align-items:baseline;gap:10px;margin-bottom:16px}
.dn2{font-family:'Bebas Neue',sans-serif;font-size:3rem;line-height:1;color:#d4a843}
.dd{font-family:'Bebas Neue',sans-serif;font-size:1rem;letter-spacing:3px;color:#444}
.sl{font-family:'Bebas Neue',sans-serif;font-size:1.2rem;letter-spacing:3px;color:#d4a843;margin:20px 0 10px;display:flex;align-items:center;gap:8px}
.cl{display:grid;gap:10px;margin-bottom:4px}
.mr{background:#141414;border:1px solid #1e1e1e;border-radius:10px;overflow:hidden}
.mr.ck{border-color:#3ddc84}
.mr-top{padding:12px 14px;display:flex;align-items:center;gap:12px;cursor:pointer}
.cb{width:22px;height:22px;border-radius:5px;border:2px solid #2e2e2e;background:transparent;display:flex;align-items:center;justify-content:center;color:#000;font-size:.8rem;font-weight:700;flex-shrink:0}
.mr.ck .cb{background:#3ddc84;border-color:#3ddc84}
.rt{font-size:.62rem;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;padding:3px 9px;border-radius:3px;flex-shrink:0}
.rl{font-size:.88rem;font-weight:500;color:#bbb;flex:1}
.mr.ck .rl{color:#444;text-decoration:line-through}
.pa{border-top:1px solid #1e1e1e;padding:10px 14px;background:#0f0f0f}
.pp{width:100%;max-height:180px;object-fit:cover;border-radius:6px;display:block;margin-bottom:8px;cursor:pointer}
.pr{font-size:.68rem;color:#ff6b35;letter-spacing:1px;text-transform:uppercase;margin-bottom:8px}
.ub{display:flex;align-items:center;gap:8px;background:#1a1a1a;border:1px dashed #333;border-radius:6px;padding:10px 14px;cursor:pointer;width:100%}
.ub span{font-size:.8rem;color:#666}
.ub.hp span{color:#3ddc84}
.ub input{display:none}
.ti{background:#1a1a1a;border:1px solid #333;border-radius:5px;padding:8px 10px;color:#e8e8e8;font-family:'DM Sans',sans-serif;font-size:.85rem;width:100%;margin-top:8px;outline:none}
.cr{background:#141414;border:1px solid #1e1e1e;border-radius:8px;padding:13px 14px;display:flex;align-items:center;gap:12px;cursor:pointer;user-select:none}
.cr.ck{background:#121f16;border-color:#3ddc84}
.cr .cb{border:2px solid #2e2e2e}
.cr.ck .cb{background:#3ddc84;border-color:#3ddc84}
.cr .rl{font-size:.88rem;font-weight:500;color:#bbb;flex:1}
.cr.ck .rl{color:#444;text-decoration:line-through}
.ri{font-size:1rem;flex-shrink:0}
.rn{color:#3a3a3a;font-size:.82rem;padding:10px 0 20px}
.nr{display:flex;gap:8px;flex-wrap:wrap;margin-top:8px}
.nb{padding:8px 20px;border-radius:5px;border:2px solid #222;background:transparent;color:#444;font-family:'DM Sans',sans-serif;font-size:.75rem;font-weight:700;letter-spacing:1px;text-transform:uppercase;cursor:pointer;outline:none}
.nb:hover{border-color:#d4a843;color:#d4a843}
.nb.dx:hover{border-color:#ff4757;color:#ff4757}
.fn{margin-top:18px;font-size:.6rem;color:#2a2a2a;text-align:center;letter-spacing:1px}
.sc{background:#141414;border:1px solid #2a1a0a;border-radius:10px;padding:16px;margin-bottom:12px}
.sc h3{font-family:'Bebas Neue',sans-serif;font-size:1rem;letter-spacing:2px;color:#e08040;margin-bottom:4px}
.sc p{font-size:.72rem;color:#555;margin-bottom:12px}
.sc img{width:100%;border-radius:6px;margin-bottom:10px;display:block;cursor:pointer}
.su{display:flex;align-items:center;gap:8px;background:#1a1a1a;border:1px dashed #2a1a0a;border-radius:6px;padding:10px 14px;cursor:pointer;width:100%}
.su span{font-size:.8rem;color:#666}
.su.hp span{color:#3ddc84}
.su input{display:none}
#modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.95);z-index:999;align-items:center;justify-content:center;padding:20px}
#modal.show{display:flex}
#modal img{max-width:100%;max-height:90vh;border-radius:8px;object-fit:contain}
#mc{position:absolute;top:20px;right:20px;background:#333;border:none;color:#fff;width:40px;height:40px;border-radius:50%;font-size:1.2rem;cursor:pointer}
</style>
</head>
<body>
<header>
  <h1>30 Day Challenge</h1>
  <p>Seabridge Gym · Paul · Tony · Josh</p>
  <div id="sync">● Loading...</div>
</header>
<div id="lb"></div>
<div id="main">
  <div id="strip"></div>
  <div id="content"></div>
  <div class="nr">
    <button class="nb" id="bp">← Prev</button>
    <button class="nb" id="bn">Next →</button>
    <button class="nb dx" id="br">Reset</button>
  </div>
  <div class="fn">SHARED LIVE — ALL FOUR SEE PROGRESS</div>
</div>
<div id="modal" onclick="closeModal()">
  <button id="mc">✕</button>
  <img id="mi" src="" alt="">
</div>

<script>
var FB = 'https://seabridge30day-default-rtdb.firebaseio.com';
var PEOPLE = ['paul','tony','josh'];
var LABELS = {paul:'Paul',tony:'Tony',josh:'Josh'};
var DAYS = 30;
var DOW = ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
var MEALS = [
  {key:'breakfast',label:'Breakfast',bg:'#1a3a5c',tc:'#60a0e0',photo:true},
  {key:'shake1',label:'Shake 1',bg:'#2d2208',tc:'#d4a843',photo:true},
  {key:'lunch',label:'Lunch',bg:'#1a2d0a',tc:'#80c040',photo:true},
  {key:'shake2',label:'Shake 2',bg:'#2d2208',tc:'#d4a843',photo:true},
  {key:'dinner',label:'Dinner',bg:'#2d0a1a',tc:'#e060a0',photo:true},
  {key:'water',label:'1 Gallon Water',bg:'#0a1e2d',tc:'#40c0ff',photo:false}
];

var ap = 'paul';
var ad = {paul:1,tony:1,josh:1};
var checks = {paul:{},tony:{},josh:{}};
var photos = {paul:{},tony:{},josh:{}};
var seca = {paul:{},tony:{},josh:{}};

function sync(msg,col){
  var el = document.getElementById('sync');
  el.textContent = msg;
  el.style.color = col || '#888';
}

function fbGet(path, cb) {
  fetch(FB + '/' + path + '.json')
    .then(function(r){ return r.json(); })
    .then(function(d){ cb(d); })
    .catch(function(){ cb(null); });
}

function fbSet(path, data) {
  fetch(FB + '/' + path + '.json', {
    method: 'PUT',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify(data)
  }).catch(function(){});
}

function loadAll() {
  var done = 0;
  var total = PEOPLE.length * 3;
  function check() {
    done++;
    render();
    if (done >= total) sync('✓ Live','#3ddc84');
  }
  PEOPLE.forEach(function(p) {
    fbGet('checks/' + p, function(d){ checks[p] = d || {}; check(); });
    fbGet('photos/' + p, function(d){ photos[p] = d || {}; check(); });
    fbGet('seca/' + p, function(d){ seca[p] = d || {}; check(); });
  });
}

function saveChecks(p) { fbSet('checks/' + p, checks[p]); }
function savePhoto(p, key, data) {
  if (!photos[p]) photos[p] = {};
  photos[p][key] = data;
  fbSet('photos/' + p + '/' + key, data);
  sync('✓ Saved','#3ddc84');
}
function saveSeca(p, key, data) {
  if (!seca[p]) seca[p] = {};
  seca[p][key] = data;
  fbSet('seca/' + p + '/' + key, data);
  sync('✓ Saved','#3ddc84');
}

function getFit(di) {
  var d = di % 7;
  return { cardio: d < 5, boot: d < 5, sun: d === 6 };
}

function getItems(di) {
  var f = getFit(di);
  var r = MEALS.map(function(m){ return m.key; });
  if (f.cardio) r.push('cardio');
  if (f.boot) r.push('boot');
  if (f.sun) { r.push('rhino'); r.push('weigh'); }
  return r;
}

function chk(p, d, i) { return !!(checks[p] && checks[p][d+'-'+i]); }
function getPhoto(p, d, i) { return photos[p] && photos[p][d+'-'+i]; }
function getSeca(p, d) { return seca[p] && seca[p]['d'+d]; }

function dayDone(p, d) {
  return getItems(d-1).every(function(i){ return chk(p, d, i); });
}

function prog(p) {
  var t = 0, dn = 0;
  for (var d = 1; d <= DAYS; d++) {
    var its = getItems(d-1);
    t += its.length;
    its.forEach(function(i){ if (chk(p, d, i)) dn++; });
  }
  return { t:t, dn:dn, pct: t ? Math.round(dn/t*100) : 0 };
}

function compress(file, cb) {
  var reader = new FileReader();
  reader.onload = function(e) {
    var img = new Image();
    img.onload = function() {
      var canvas = document.createElement('canvas');
      var max = 600;
      var scale = Math.min(1, max / img.width);
      canvas.width = img.width * scale;
      canvas.height = img.height * scale;
      canvas.getContext('2d').drawImage(img, 0, 0, canvas.width, canvas.height);
      cb(canvas.toDataURL('image/jpeg', 0.7));
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
}

function openModal(src) {
  document.getElementById('mi').src = src;
  document.getElementById('modal').className = 'show';
}
function closeModal() { document.getElementById('modal').className = ''; }

function sw(p) { ap = p; render(); }
function go(d) { ad[ap] = d; render(); }

document.getElementById('bp').onclick = function(){ if(ad[ap]>1){ad[ap]--;render();} };
document.getElementById('bn').onclick = function(){ if(ad[ap]<DAYS){ad[ap]++;render();} };
document.getElementById('br').onclick = function(){
  if(confirm('Reset '+LABELS[ap]+'?')){ checks[ap]={}; saveChecks(ap); render(); }
};

function handleMealPhoto(p, d, item, input) {
  if (!input.files[0]) return;
  sync('⟳ Uploading...','#d4a843');
  compress(input.files[0], function(data) {
    savePhoto(p, d+'-'+item, data);
    render();
  });
}

function handleSecaPhoto(p, d, input) {
  if (!input.files[0]) return;
  sync('⟳ Uploading...','#d4a843');
  compress(input.files[0], function(data) {
    saveSeca(p, d, data);
    render();
  });
}

function handleCardioPhoto(p, d, input) {
  if (!input.files[0]) return;
  sync('⟳ Uploading...','#d4a843');
  compress(input.files[0], function(data) {
    savePhoto(p, d+'-cardio', data);
    render();
  });
}

function checkMeal(p, d, item) {
  var meal = null;
  for (var i = 0; i < MEALS.length; i++) { if (MEALS[i].key === item) { meal = MEALS[i]; break; } }
  if (meal && meal.photo && !getPhoto(p, d, item)) {
    alert('📸 Upload a photo first to check off this item.');
    return;
  }
  var k = d+'-'+item;
  checks[p][k] = !checks[p][k];
  saveChecks(p);
  render();
}

function checkCardio(p, d) {
  if (!getPhoto(p, d, 'cardio')) { alert('📸 Upload cardio machine photo first.'); return; }
  var t = checks[p] && checks[p][d+'-cardiotime'];
  if (!t || !t.trim()) { alert('⏱ Enter your cardio time first.'); return; }
  var k = d+'-cardio';
  checks[p][k] = !checks[p][k];
  saveChecks(p);
  render();
}

function saveCardioTime(p, d, val) {
  checks[p][d+'-cardiotime'] = val;
  saveChecks(p);
}

function checkSimple(p, d, item) {
  var k = d+'-'+item;
  checks[p][k] = !checks[p][k];
  saveChecks(p);
  render();
}

function render() {
  var day = ad[ap];
  var f = getFit(day-1);
  var dow = DOW[(day-1)%7];
  var wk = Math.ceil(day/7);

  // Leaderboard
  var lbHTML = '';
  PEOPLE.forEach(function(p) {
    var pg = prog(p);
    var on = ap === p;
    lbHTML += '<div class="lbc'+(on?' on':'')+'" onclick="sw(\''+p+'\')">' +
      '<div class="lbn">'+LABELS[p]+'</div>' +
      '<div class="lbp">'+pg.pct+'%</div>' +
      '<div class="lbb"><div class="lbf" style="width:'+pg.pct+'%"></div></div>' +
      '<div class="lbx">'+pg.dn+'/'+pg.t+'</div></div>';
  });
  document.getElementById('lb').innerHTML = lbHTML;

  // Day strip
  var stripHTML = '';
  for (var d = 1; d <= DAYS; d++) {
    var cls = 'db';
    if (day === d) cls += ' on';
    else if (dayDone(ap, d)) cls += ' dn';
    stripHTML += '<button class="'+cls+'" onclick="go('+d+')">'+d+'</button>';
  }
  document.getElementById('strip').innerHTML = stripHTML;
  setTimeout(function(){
    var a = document.querySelector('.db.on');
    if (a) a.scrollIntoView({block:'nearest',inline:'center',behavior:'smooth'});
  }, 50);

  // Meal rows
  var mealHTML = '';
  MEALS.forEach(function(m) {
    var ck = chk(ap, day, m.key);
    var ph = getPhoto(ap, day, m.key);
    var row = '<div class="mr'+(ck?' ck':'')+'">';
    row += '<div class="mr-top" onclick="checkMeal(\''+ap+'\','+day+',\''+m.key+'\')">';
    row += '<div class="cb">'+(ck?'✓':'')+'</div>';
    row += '<span class="rt" style="background:'+m.bg+';color:'+m.tc+'">'+m.label+'</span>';
    row += '<span class="rl">'+m.label+'</span></div>';
    if (m.photo) {
      row += '<div class="pa">';
      if (ph) row += '<img class="pp" src="'+ph+'" onclick="openModal(\''+ph+'\')" alt="">';
      if (!ck) row += '<div class="pr">📸 Photo required to check off</div>';
      row += '<label class="ub'+(ph?' hp':'')+'">';
      row += '<span>'+(ph?'✓ Photo saved — tap to change':'📷 Upload photo of '+m.label)+'</span>';
      row += '<input type="file" accept="image/*" onchange="handleMealPhoto(\''+ap+'\','+day+',\''+m.key+'\',this)"></label>';
      row += '</div>';
    }
    row += '</div>';
    mealHTML += row;
  });

  // Fitness
  var fitHTML = '';
  if (f.cardio || f.boot) {
    fitHTML = '<div class="sl">🏃 Fitness</div><div class="cl">';
    // Cardio with photo + time
    if (f.cardio) {
      var ck2 = chk(ap, day, 'cardio');
      var cph = getPhoto(ap, day, 'cardio');
      var ctime = checks[ap] && checks[ap][day+'-cardiotime'] || '';
      fitHTML += '<div class="mr'+(ck2?' ck':'')+'">';
      fitHTML += '<div class="mr-top" onclick="checkCardio(\''+ap+'\','+day+')">';
      fitHTML += '<div class="cb">'+(ck2?'✓':'')+'</div>';
      fitHTML += '<span class="ri">🔥</span>';
      fitHTML += '<span class="rt" style="background:#2a1508;color:#e08040">Cardio</span>';
      fitHTML += '<span class="rl">30 Min Cardio'+(ctime?' <span style="color:#3ddc84;font-size:.75rem">· '+ctime+'</span>':'')+'</span></div>';
      fitHTML += '<div class="pa">';
      if (cph) fitHTML += '<img class="pp" src="'+cph+'" onclick="openModal(\''+cph+'\')" alt="">';
      fitHTML += '<div class="pr">📸 Photo + time required</div>';
      fitHTML += '<label class="ub'+(cph?' hp':'')+'">';
      fitHTML += '<span>'+(cph?'✓ Photo saved — tap to change':'📷 Upload cardio machine photo')+'</span>';
      fitHTML += '<input type="file" accept="image/*" onchange="handleCardioPhoto(\''+ap+'\','+day+',this)"></label>';
      fitHTML += '<input class="ti" type="text" placeholder="Enter time e.g. 32 min" value="'+ctime+'" onchange="saveCardioTime(\''+ap+'\','+day+',this.value)">';
      fitHTML += '</div></div>';
    }
    // Bootcamp simple
    if (f.boot) {
      var bck = chk(ap, day, 'boot');
      fitHTML += '<div class="cr'+(bck?' ck':'')+'" onclick="checkSimple(\''+ap+'\','+day+',\'boot\')">';
      fitHTML += '<div class="cb">'+(bck?'✓':'')+'</div>';
      fitHTML += '<span class="ri">⚡</span>';
      fitHTML += '<span class="rt" style="background:#08162a;color:#4db8ff">Bootcamp</span>';
      fitHTML += '<span class="rl">5AM Bootcamp Class</span></div>';
    }
    fitHTML += '</div>';
  } else {
    fitHTML = '<div class="sl">😴 Rest Day</div><div class="rn">'+(f.sun?'Rest & recovery — check in with John below.':'Recovery, stretch, or walk.')+'</div>';
  }

  // Sunday
  var sunHTML = '';
  if (f.sun) {
    var rck = chk(ap,day,'rhino'), wck = chk(ap,day,'weigh');
    var sd = getSeca(ap, day);
    sunHTML += '<div class="sl">📋 Weekly Check-In</div><div class="cl">';
    sunHTML += '<div class="cr'+(rck?' ck':'')+'" onclick="checkSimple(\''+ap+'\','+day+',\'rhino\')">';
    sunHTML += '<div class="cb">'+(rck?'✓':'')+'</div><span class="ri">📱</span>';
    sunHTML += '<span class="rt" style="background:#0d1f2d;color:#4db8ff">RhinoFit</span>';
    sunHTML += '<span class="rl">Check-In with John (Trainer) — Fasted</span></div>';
    sunHTML += '<div class="cr'+(wck?' ck':'')+'" onclick="checkSimple(\''+ap+'\','+day+',\'weigh\')">';
    sunHTML += '<div class="cb">'+(wck?'✓':'')+'</div><span class="ri">⚖️</span>';
    sunHTML += '<span class="rt" style="background:#1a0d2d;color:#b87fff">Weigh-In</span>';
    sunHTML += '<span class="rl">Weekly Weigh-In — Fasted Stomach</span></div></div>';
    sunHTML += '<div class="sl">📊 SECA Scan</div>';
    sunHTML += '<div class="sc"><h3>Week '+wk+' Scan</h3><p>Upload SECA body composition scan after check-in</p>';
    if (sd) sunHTML += '<img src="'+sd+'" onclick="openModal(\''+sd+'\')" alt="SECA">';
    sunHTML += '<label class="su'+(sd?' hp':'')+'">';
    sunHTML += '<span>'+(sd?'✓ Scan uploaded — tap to change':'📄 Upload SECA scan')+'</span>';
    sunHTML += '<input type="file" accept="image/*" onchange="handleSecaPhoto(\''+ap+'\','+day+',this)"></label></div>';
  }

  // Day 1 SECA baseline
  var d1HTML = '';
  if (day === 1) {
    var s1 = getSeca(ap, 1);
    d1HTML = '<div class="sl">📊 SECA — Day 1 Baseline</div>';
    d1HTML += '<div class="sc"><h3>Day 1 Baseline Scan</h3><p>Upload your starting body composition scan</p>';
    if (s1) d1HTML += '<img src="'+s1+'" onclick="openModal(\''+s1+'\')" alt="SECA">';
    d1HTML += '<label class="su'+(s1?' hp':'')+'">';
    d1HTML += '<span>'+(s1?'✓ Scan uploaded — tap to change':'📄 Upload Day 1 SECA scan')+'</span>';
    d1HTML += '<input type="file" accept="image/*" onchange="handleSecaPhoto(\''+ap+'\',1,this)"></label></div>';
  }

  document.getElementById('content').innerHTML =
    '<div class="dh"><span class="dn2">Day '+day+'</span><span class="dd">'+dow+' · Week '+wk+'</span></div>' +
    '<div class="sl">🍽️ Meals & Shakes</div><div class="cl">'+mealHTML+'</div>' +
    fitHTML + sunHTML + d1HTML;
}

// ── START ──
render();
sync('● Loading...','#d4a843');

// Poll Firebase every 8 seconds
function poll() {
  var done = 0;
  var total = PEOPLE.length * 3;
  function check(){ done++; if(done>=total){ render(); sync('✓ Live','#3ddc84'); } }
  PEOPLE.forEach(function(p){
    fbGet('checks/'+p, function(d){ checks[p]=d||{}; check(); });
    fbGet('photos/'+p, function(d){ photos[p]=d||{}; check(); });
    fbGet('seca/'+p, function(d){ seca[p]=d||{}; check(); });
  });
}
poll();
